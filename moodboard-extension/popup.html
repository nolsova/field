<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Save to Field</title>
<style>
  :root {
    --bg: #0c0c0d;
    --bg-elevated: #161617;
    --text: #e8e6e1;
    --text-dim: #8a8884;
    --accent: #d4cfc4;
    --border: rgba(255,255,255,0.08);
    --danger: #d4736a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }

  .settings-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
  }

  .settings-btn:hover { color: var(--text); }

  /* Loading / empty / error states */
  .state-msg {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-dim);
  }

  /* Image grid picker */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
    max-height: 320px;
    overflow-y: auto;
  }

  .image-grid::-webkit-scrollbar { width: 4px; }
  .image-grid::-webkit-scrollbar-track { background: transparent; }
  .image-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .img-tile {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 3px;
    cursor: pointer;
    background: var(--bg-elevated);
  }

  .img-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .img-tile .check {
    position: absolute;
    inset: 0;
    background: rgba(212, 207, 196, 0.2);
    border: 2px solid var(--accent);
    border-radius: 3px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--accent);
  }

  .img-tile.selected .check { display: flex; }

  /* Tag chip input — same style as the main app */
  .chip-input {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    padding: 7px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: text;
    min-height: 36px;
  }

  .chip-input:focus-within { border-color: var(--accent); }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px 2px 8px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 100px;
    font-size: 11px;
  }

  .chip-remove {
    border: none;
    background: rgba(0,0,0,0.15);
    color: var(--bg);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chip-text-input {
    flex: 1;
    min-width: 60px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }

  .chip-text-input::placeholder { color: var(--text-dim); }

  /* Footer: tag input + save button */
  footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .selected-count { color: var(--text-dim); font-size: 12px; flex-shrink: 0; }

  .save-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .save-btn:disabled { opacity: 0.5; cursor: default; }

  .notes-input {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    resize: none;
    height: 52px;
    outline: none;
  }

  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--text-dim); }

  #statusMsg {
    font-size: 11px;
    color: var(--text-dim);
    min-height: 14px;
    text-align: center;
  }

  #statusMsg.error { color: var(--danger); }
  #statusMsg.success { color: #7acc8f; }
</style>
</head>
<body>

<header>
  <span class="logo">save to field</span>
  <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
</header>

<div id="content">
  <div class="state-msg" id="stateMsg">scanning page for images…</div>
  <div class="image-grid" id="imageGrid" style="display:none;"></div>
</div>

<footer id="footer" style="display:none;">
  <div class="chip-input" id="tagChipInput"></div>
  <textarea class="notes-input" id="notesInput" placeholder="notes (optional — source context is captured automatically)"></textarea>
  <div class="footer-row">
    <span class="selected-count" id="selectedCount">0 selected</span>
    <button class="save-btn" id="saveBtn" disabled>save</button>
  </div>
  <div id="statusMsg"></div>
</footer>

<script src="popup.js"></script>
</body>
</html>
